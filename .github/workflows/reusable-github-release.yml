name: Reusable — GitHub release (ploi-ts-sdk)

on:
  workflow_call:
    inputs:
      project-dir:
        type: string
        default: .

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ploi-ts-sdk-dist
          path: ${{ inputs.project-dir }}/dist

      - name: Resolve release metadata
        id: meta
        working-directory: ${{ inputs.project-dir }}
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          TAG=$(node -e "import('./scripts/resolve-app-version.mjs').then(m => console.log(m.resolveReleaseTag()))")
          TITLE=$(node -e "import('./scripts/resolve-app-version.mjs').then(m => console.log(m.resolveReleaseTitle('ploi-ts-sdk')))")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Prepare release files
        working-directory: ${{ inputs.project-dir }}
        run: |
          chmod +x scripts/prepare-release-assets.sh
          scripts/prepare-release-assets.sh "$PWD" "$GITHUB_WORKSPACE/release-upload"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: false
          body: |
            Automated **ploi-ts-sdk** build from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            ### Downloads

            | File | Description |
            |---|---|
            | `ploi-ts-sdk-*.tgz` | npm package (`npm install ./ploi-ts-sdk-*.tgz`) |
            | `ploi-ts-sdk-*-dist.zip` | Compiled `dist/`, README, LICENSE |

            Also published to GitHub Packages as `@elizonapp/ploi-ts-sdk`.
          files: |
            release-upload/*
