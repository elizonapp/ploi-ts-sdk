name: Reusable — publish GitHub Package

on:
  workflow_call:
    inputs:
      project-dir:
        type: string
        default: .

jobs:
  publish:
    name: Publish GitHub Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://npm.pkg.github.com
          scope: '@elizonapp'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ploi-ts-sdk-dist
          path: ${{ inputs.project-dir }}/dist

      # GitHub Packages rejects republishing the same version (E409).
      # Append the workflow run id so each push publishes a unique prerelease.
      - name: Set unique publish version
        run: |
          BASE=$(node -p "require('./package.json').version.split('-')[0]")
          VERSION="${BASE}-${{ github.run_id }}"
          npm pkg set "version=${VERSION}"
          echo "Publishing @elizonapp/ploi-ts-sdk@${VERSION}"

      - name: Publish to GitHub Packages
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
